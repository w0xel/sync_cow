name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run doc tests
      run: cargo test --doc --verbose
  miri:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install nightly toolchain with miri
      run: rustup toolchain install nightly-2026-05-04 --component miri
    - name: Run miri tests
      env:
        MIRIFLAGS: '-Zmiri-many-seeds=0..512'
      run: cargo +nightly-2026-05-04 miri test tests::race
